<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --surface: #0f0f0f;
      --border: rgba(255,255,255,0.07);
      --text-primary: #f0ede8;
      --text-secondary: rgba(240,237,232,0.4);
      --text-muted: rgba(240,237,232,0.2);
      --accent: #c8f0d8;
      --accent-glow: rgba(200,240,216,0.15);
      --accent-dim: rgba(200,240,216,0.06);
      --danger: #f08080;
      --danger-dim: rgba(240,128,128,0.08);
      --orb-idle: rgba(200,240,216,0.03);
      --orb-listening: rgba(200,240,216,0.12);
      --orb-speaking: rgba(200,240,216,0.2);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Geist', sans-serif;
      font-weight: 300;
      overflow: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.6;
    }

    .scene {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    /* Ambient background glow that reacts to state */
    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      transition: opacity 1.5s ease;
    }

    .ambient::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 1.5s ease, transform 1.5s ease;
    }

    .ambient.listening::before { opacity: 0.6; transform: translate(-50%, -50%) scale(1.1); }
    .ambient.speaking::before  { opacity: 1;   transform: translate(-50%, -50%) scale(1.3); }
    .ambient.thinking::before  { opacity: 0.3; transform: translate(-50%, -50%) scale(0.9); }

    /* Header */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 2rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
    }

    .logo {
      font-family: 'Instrument Serif', serif;
      font-size: 1.125rem;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .logo span {
      color: var(--text-secondary);
      font-style: italic;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.375rem 0.875rem;
      border: 1px solid var(--border);
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--text-secondary);
      letter-spacing: 0.02em;
      text-transform: uppercase;
      transition: all 0.4s ease;
      backdrop-filter: blur(8px);
    }

    .status-pill.connected {
      border-color: rgba(200,240,216,0.2);
      color: var(--accent);
    }

    .status-dot-pill {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      transition: all 0.4s ease;
    }

    .status-pill.connected .status-dot-pill {
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ORB */
    .orb-container {
      position: relative;
      width: 280px;
      height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 3rem;
    }

    /* Outer ring pulses */
    .orb-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(200,240,216,0.08);
      transition: all 0.6s ease;
    }

    .orb-ring-2 {
      inset: -20px;
      border-color: rgba(200,240,216,0.04);
      animation: none;
    }

    .orb-ring-3 {
      inset: -44px;
      border-color: rgba(200,240,216,0.02);
    }

    /* Speaking ring pulse */
    .speaking .orb-ring   { border-color: rgba(200,240,216,0.2); animation: ringPulse 1.2s ease-in-out infinite; }
    .speaking .orb-ring-2 { border-color: rgba(200,240,216,0.1); animation: ringPulse 1.2s ease-in-out infinite 0.15s; }
    .speaking .orb-ring-3 { border-color: rgba(200,240,216,0.05); animation: ringPulse 1.2s ease-in-out infinite 0.3s; }

    .listening .orb-ring   { border-color: rgba(200,240,216,0.12); }
    .listening .orb-ring-2 { border-color: rgba(200,240,216,0.06); animation: ringBreath 3s ease-in-out infinite; }

    @keyframes ringPulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.04); opacity: 0.7; }
    }

    @keyframes ringBreath {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    /* Core orb */
    .orb {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      position: relative;
      cursor: pointer;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .orb:hover { transform: scale(1.04); }
    .orb:active { transform: scale(0.97); }

    .orb-inner {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 35%,
        rgba(200,240,216,0.18) 0%,
        rgba(200,240,216,0.06) 40%,
        rgba(200,240,216,0.02) 70%,
        transparent 100%
      );
      border: 1px solid rgba(200,240,216,0.12);
      transition: all 0.6s ease;
      overflow: hidden;
    }

    /* Glossy highlight */
    .orb-inner::before {
      content: '';
      position: absolute;
      top: 12%;
      left: 18%;
      width: 38%;
      height: 28%;
      background: radial-gradient(ellipse, rgba(255,255,255,0.15) 0%, transparent 80%);
      border-radius: 50%;
      transform: rotate(-30deg);
    }

    /* Animated shimmer inside orb */
    .orb-inner::after {
      content: '';
      position: absolute;
      inset: -50%;
      background: conic-gradient(
        from 0deg,
        transparent 0deg,
        rgba(200,240,216,0.06) 60deg,
        transparent 120deg
      );
      animation: orbSpin 8s linear infinite;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .speaking .orb-inner { 
      background: radial-gradient(circle at 38% 35%,
        rgba(200,240,216,0.35) 0%,
        rgba(200,240,216,0.15) 40%,
        rgba(200,240,216,0.05) 70%,
        transparent 100%
      );
      border-color: rgba(200,240,216,0.3);
      box-shadow: 0 0 60px rgba(200,240,216,0.12), inset 0 0 30px rgba(200,240,216,0.05);
    }
    .speaking .orb-inner::after { opacity: 1; }

    .listening .orb-inner {
      background: radial-gradient(circle at 38% 35%,
        rgba(200,240,216,0.22) 0%,
        rgba(200,240,216,0.09) 40%,
        rgba(200,240,216,0.02) 70%,
        transparent 100%
      );
      border-color: rgba(200,240,216,0.18);
      box-shadow: 0 0 30px rgba(200,240,216,0.06);
    }

    .thinking .orb-inner {
      animation: orbThink 2s ease-in-out infinite;
    }

    @keyframes orbSpin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes orbThink {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(0.96); opacity: 0.7; }
    }

    /* Bars visualizer inside orb */
    .orb-bars {
      position: absolute;
      bottom: 30%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 32px;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .orb-bars.visible { opacity: 1; }

    .orb-bar {
      width: 3px;
      height: 4px;
      border-radius: 99px;
      background: rgba(200,240,216,0.8);
      transition: height 0.1s ease;
    }

    .speaking .orb-bar { animation: barDance 0.8s ease-in-out infinite; }
    .speaking .orb-bar:nth-child(1) { animation-delay: 0s; }
    .speaking .orb-bar:nth-child(2) { animation-delay: 0.1s; }
    .speaking .orb-bar:nth-child(3) { animation-delay: 0.2s; }
    .speaking .orb-bar:nth-child(4) { animation-delay: 0.3s; }
    .speaking .orb-bar:nth-child(5) { animation-delay: 0.2s; }
    .speaking .orb-bar:nth-child(6) { animation-delay: 0.1s; }
    .speaking .orb-bar:nth-child(7) { animation-delay: 0s; }

    .listening .orb-bar { animation: barListen 1.8s ease-in-out infinite; }
    .listening .orb-bar:nth-child(1) { animation-delay: 0s; }
    .listening .orb-bar:nth-child(2) { animation-delay: 0.15s; }
    .listening .orb-bar:nth-child(3) { animation-delay: 0.3s; }
    .listening .orb-bar:nth-child(4) { animation-delay: 0.45s; }
    .listening .orb-bar:nth-child(5) { animation-delay: 0.3s; }
    .listening .orb-bar:nth-child(6) { animation-delay: 0.15s; }
    .listening .orb-bar:nth-child(7) { animation-delay: 0s; }

    @keyframes barDance {
      0%, 100% { height: 4px; }
      50% { height: 22px; }
    }

    @keyframes barListen {
      0%, 100% { height: 4px; }
      50% { height: 10px; }
    }

    /* Orb center icon */
    .orb-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 2rem;
      transition: opacity 0.4s ease, transform 0.4s ease;
      user-select: none;
    }

    .connected .orb-icon { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }

    /* State label */
    .state-label {
      font-size: 0.8125rem;
      font-weight: 300;
      color: var(--text-secondary);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 4rem;
      min-height: 1.2em;
      transition: all 0.4s ease;
    }

    /* Bottom controls */
    .controls {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
    }

    .btn-group {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.875rem 2rem;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--text-primary);
      font-family: 'Geist', sans-serif;
      font-size: 0.875rem;
      font-weight: 400;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: all 0.25s ease;
      backdrop-filter: blur(12px);
      white-space: nowrap;
    }

    .btn:hover:not(:disabled) {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.12);
      transform: translateY(-1px);
    }

    .btn:active:not(:disabled) { transform: translateY(0); }

    .btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .btn-start {
      background: rgba(200,240,216,0.08);
      border-color: rgba(200,240,216,0.2);
      color: var(--accent);
      padding: 0.875rem 2.5rem;
    }

    .btn-start:hover:not(:disabled) {
      background: rgba(200,240,216,0.14);
      border-color: rgba(200,240,216,0.35);
      box-shadow: 0 0 24px rgba(200,240,216,0.08);
    }

    .btn-end {
      background: var(--danger-dim);
      border-color: rgba(240,128,128,0.15);
      color: var(--danger);
    }

    .btn-end:hover:not(:disabled) {
      background: rgba(240,128,128,0.12);
      border-color: rgba(240,128,128,0.25);
    }

    .btn-icon {
      width: 40px;
      height: 40px;
      padding: 0;
      border-radius: 50%;
    }

    .footer-note {
      font-size: 0.6875rem;
      color: var(--text-muted);
      letter-spacing: 0.03em;
    }

    /* Cold start notice */
    .cold-notice {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, calc(-50% + 180px));
      background: rgba(240,200,100,0.06);
      border: 1px solid rgba(240,200,100,0.15);
      border-radius: 12px;
      padding: 0.75rem 1.25rem;
      font-size: 0.8rem;
      color: rgba(240,200,100,0.7);
      text-align: center;
      max-width: 280px;
      display: none;
      z-index: 20;
    }

    .cold-notice.visible { display: block; }

    /* Page load animation */
    .scene { animation: fadeIn 0.8s ease forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Transcript */
    .transcript {
      position: fixed;
      bottom: 140px;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      padding: 0 2rem;
      text-align: center;
      font-size: 0.9375rem;
      font-style: italic;
      font-family: 'Instrument Serif', serif;
      color: var(--text-secondary);
      line-height: 1.6;
      min-height: 2.4em;
      transition: all 0.4s ease;
      pointer-events: none;
    }

    audio { display: none; }

    /* Camera button */
    .btn-camera {
      width: 44px;
      height: 44px;
      padding: 0;
      border-radius: 50%;
      font-size: 1.1rem;
      display: none;
      border-color: rgba(200,240,216,0.15);
      color: rgba(200,240,216,0.7);
    }

    .btn-camera:hover:not(:disabled) {
      background: rgba(200,240,216,0.08);
      border-color: rgba(200,240,216,0.3);
      color: var(--accent);
    }

    .btn-camera.visible { display: flex; }

    /* Photo overlay */
    .photo-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 2rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .photo-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .photo-overlay h2 {
      font-family: 'Instrument Serif', serif;
      font-weight: 400;
      font-size: 1.5rem;
      color: var(--text-primary);
    }

    .photo-overlay p {
      font-size: 0.875rem;
      color: var(--text-secondary);
      text-align: center;
      max-width: 320px;
      line-height: 1.6;
    }

    #cameraFeed {
      width: 100%;
      max-width: 400px;
      border-radius: 16px;
      border: 1px solid var(--border);
      display: none;
    }

    #photoCanvas { display: none; }

    #photoPreview {
      width: 100%;
      max-width: 400px;
      border-radius: 16px;
      border: 1px solid rgba(200,240,216,0.2);
      display: none;
    }

    .photo-btn-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* Analysis result */
    .analysis-bubble {
      position: fixed;
      bottom: 160px;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      padding: 0 2rem;
      z-index: 50;
      display: none;
    }

    .analysis-bubble.visible { display: block; }

    .analysis-bubble-inner {
      background: rgba(200,240,216,0.05);
      border: 1px solid rgba(200,240,216,0.15);
      border-radius: 16px;
      padding: 1rem 1.25rem;
      font-size: 0.875rem;
      color: var(--text-secondary);
      line-height: 1.6;
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
    }

    .analysis-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 0.1rem; }

    .analysis-text { flex: 1; }

    .analysis-label {
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.25rem;
      font-weight: 500;
    }

    .analysis-close {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 0;
      flex-shrink: 0;
      line-height: 1;
    }

    .analysis-close:hover { color: var(--text-secondary); }

    .photo-thumbnail {
      position: fixed;
      bottom: 155px;
      right: 2rem;
      width: 56px;
      height: 56px;
      border-radius: 10px;
      object-fit: cover;
      border: 2px solid rgba(200,240,216,0.3);
      cursor: pointer;
      display: none;
      z-index: 50;
      transition: transform 0.2s ease;
    }

    .photo-thumbnail:hover { transform: scale(1.05); }
    .photo-thumbnail.visible { display: block; }
  </style>
</head>
<body>

  <div class="ambient" id="ambient"></div>

  <!-- Header -->
  <header class="header">
    <div class="logo">AI <span>Assistant</span></div>
    <div class="status-pill" id="statusPill">
      <div class="status-dot-pill"></div>
      <span id="statusText">Ready</span>
    </div>
  </header>

  <!-- Main scene -->
  <div class="scene">
    <div class="orb-container" id="orbContainer">
      <div class="orb-ring orb-ring-3"></div>
      <div class="orb-ring orb-ring-2"></div>
      <div class="orb-ring"></div>
      <div class="orb" id="orb" onclick="handleOrbClick()">
        <div class="orb-inner">
          <div class="orb-bars" id="orbBars">
            <div class="orb-bar"></div>
            <div class="orb-bar"></div>
            <div class="orb-bar"></div>
            <div class="orb-bar"></div>
            <div class="orb-bar"></div>
            <div class="orb-bar"></div>
            <div class="orb-bar"></div>
          </div>
        </div>
        <div class="orb-icon">🎙</div>
      </div>
    </div>

    <div class="state-label" id="stateLabel">Tap to begin</div>
  </div>

  <!-- Transcript -->
  <div class="transcript" id="transcript"></div>

  <!-- Cold start notice -->
  <div class="cold-notice" id="coldNotice">
    ⏳ Waking up server — first load may take 30–60s
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="btn-group" id="btnGroup">
      <button class="btn btn-start" id="mainBtn" onclick="handleOrbClick()">
        Start conversation
      </button>
    </div>
    <div class="footer-note">Your conversation is private and not stored</div>
  </div>

  <!-- Camera overlay -->
  <div class="photo-overlay" id="photoOverlay">
    <h2>Capture the issue</h2>
    <p>Take a photo and Grok will analyse it and describe what it sees</p>
    <video id="cameraFeed" autoplay playsinline></video>
    <img id="photoPreview" alt="Captured photo" />
    <canvas id="photoCanvas"></canvas>
    <div class="photo-btn-row" id="photoButtons">
      <button class="btn btn-start" id="snapBtn" onclick="snapPhoto()" style="display:none">📸 Capture</button>
      <button class="btn btn-start" id="analyseBtn" onclick="analysePhoto()" style="display:none">🔍 Analyse with Grok</button>
      <button class="btn btn-start" id="retakeBtn" onclick="retakePhoto()" style="display:none">↩ Retake</button>
      <button class="btn btn-end" onclick="closeCamera()">✕ Cancel</button>
    </div>
  </div>

  <!-- Photo thumbnail -->
  <img id="photoThumbnail" class="photo-thumbnail" onclick="showAnalysis()" title="View analysis" />

  <!-- Analysis result bubble -->
  <div class="analysis-bubble" id="analysisBubble">
    <div class="analysis-bubble-inner">
      <div class="analysis-icon">🔍</div>
      <div class="analysis-text">
        <div class="analysis-label">Grok Vision Analysis</div>
        <div id="analysisText"></div>
      </div>
      <button class="analysis-close" onclick="document.getElementById('analysisBubble').classList.remove('visible')">✕</button>
    </div>
  </div>

  <!-- Audio -->
  <audio id="agentAudio" autoplay playsinline></audio>

  <script>
    // ─── CONFIG ───────────────────────────────────────────────
    const TOKEN_SERVER_URL = 'https://livekit-token-server-80kc.onrender.com/token';
    // ──────────────────────────────────────────────────────────

    const { Room, RoomEvent, Track, ParticipantEvent } = LivekitClient;

    let room = null;
    let appState = 'idle'; // idle | connecting | listening | speaking | thinking | error

    const orbContainer = document.getElementById('orbContainer');
    const orb          = document.getElementById('orb');
    const orbBars      = document.getElementById('orbBars');
    const ambient      = document.getElementById('ambient');
    const stateLabel   = document.getElementById('stateLabel');
    const statusPill   = document.getElementById('statusPill');
    const statusText   = document.getElementById('statusText');
    const mainBtn      = document.getElementById('mainBtn');
    const btnGroup     = document.getElementById('btnGroup');
    const transcript   = document.getElementById('transcript');
    const coldNotice   = document.getElementById('coldNotice');

    function setState(state, label) {
      appState = state;
      // Update orb
      orbContainer.className = 'orb-container ' + state;
      ambient.className = 'ambient ' + state;
      orbBars.className = 'orb-bars ' + (['speaking','listening'].includes(state) ? 'visible' : '');
      stateLabel.textContent = label || '';
    }

    function setStatus(text, connected = false) {
      statusText.textContent = text;
      statusPill.className = 'status-pill' + (connected ? ' connected' : '');
    }

    function setControls(mode) {
      if (mode === 'idle') {
        btnGroup.innerHTML = `<button class="btn btn-start" onclick="handleOrbClick()">Start conversation</button>`;
      } else if (mode === 'connecting') {
        btnGroup.innerHTML = `<button class="btn" disabled>Connecting…</button>`;
      } else if (mode === 'connected') {
        btnGroup.innerHTML = `
          <button class="btn btn-camera visible" onclick="openCamera()" title="Capture photo for Grok to analyse">📷</button>
          <button class="btn btn-end" onclick="disconnect()">End conversation</button>
        `;
      } else if (mode === 'error') {
        btnGroup.innerHTML = `<button class="btn btn-start" onclick="handleOrbClick()">Try again</button>`;
      }
    }

    // Pre-create and unlock AudioContext on user gesture (Chrome requires this)
    let audioCtxUnlocked = false;
    function unlockAudio() {
      if (audioCtxUnlocked) return;
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        ctx.resume();
        // Also prime the audio element
        const el = document.getElementById('agentAudio');
        el.muted = false;
        el.volume = 1.0;
        // Play silence to unlock
        el.src = 'data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA';
        el.play().then(() => { el.src = ''; audioCtxUnlocked = true; }).catch(() => {});
      } catch(e) {}
    }

    function handleOrbClick() {
      unlockAudio(); // unlock synchronously during user gesture
      if (appState === 'idle' || appState === 'error') connect();
    }

    async function connect() {
      setState('connecting', 'Connecting…');
      setStatus('Connecting');
      setControls('connecting');
      transcript.textContent = '';

      const coldTimer = setTimeout(() => coldNotice.classList.add('visible'), 3000);

      try {
        const res = await fetch(TOKEN_SERVER_URL);
        clearTimeout(coldTimer);
        coldNotice.classList.remove('visible');

        if (!res.ok) throw new Error('Token server error: ' + res.status);
        const { token, url } = await res.json();

        room = new Room();

        room.on(RoomEvent.Disconnected, () => {
          setState('idle', 'Tap to begin');
          setStatus('Ready');
          setControls('idle');
          transcript.textContent = '';
        });

        room.on(RoomEvent.ParticipantConnected, (participant) => {
          console.log('✅ Agent joined:', participant.identity);
          watchAgentState(participant);
        });

        // Check if agent already in room
        room.on(RoomEvent.Connected, () => {
          room.remoteParticipants.forEach(p => watchAgentState(p));
        });

        room.on(RoomEvent.TrackSubscribed, (track, publication, participant) => {
          console.log('🔊 Audio track from:', participant.identity);
          if (track.kind === Track.Kind.Audio) {
            console.log('🔧 mediaStreamTrack:', track.mediaStreamTrack?.readyState, track.mediaStreamTrack?.enabled);
            
            // Approach: use srcObject with raw MediaStream
            const el = document.getElementById('agentAudio');
            const stream = new MediaStream([track.mediaStreamTrack]);
            el.srcObject = stream;
            el.muted = false;
            el.volume = 1.0;
            el.play()
              .then(() => console.log('🎵 Agent audio playing via srcObject!'))
              .catch(e => {
                console.error('❌ play() failed:', e.name, e.message);
              });

            // Also try Web Audio API as parallel approach
            try {
              const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
              audioCtx.resume().then(() => {
                const source = audioCtx.createMediaStreamSource(stream);
                source.connect(audioCtx.destination);
                console.log('🎵 Agent audio also routed via Web Audio API, state:', audioCtx.state);
              });
            } catch(e) {
              console.warn('Web Audio API fallback failed:', e);
            }
          }
        });

        // Transcription from agent
        room.on(RoomEvent.TranscriptionReceived, (segments) => {
          const text = segments.map(s => s.text).join(' ');
          if (text.trim()) transcript.textContent = text;
          setTimeout(() => { transcript.textContent = ''; }, 6000);
        });

        await room.connect(url, token);
        await room.startAudio();
        await room.localParticipant.setMicrophoneEnabled(true);

        setState('listening', 'Listening…');
        setStatus('Live', true);
        setControls('connected');

      } catch (err) {
        clearTimeout(coldTimer);
        coldNotice.classList.remove('visible');
        console.error(err);
        setState('error', 'Connection failed');
        setStatus('Error');
        setControls('error');
      }
    }

    function watchAgentState(participant) {
      // Read agent state from participant attributes
      function updateFromAttributes() {
        const attrs = participant.attributes || {};
        const agentState = attrs['lk.agent.state'] || '';
        console.log('Agent state:', agentState);

        if (agentState === 'speaking') {
          setState('speaking', 'Speaking…');
        } else if (agentState === 'listening') {
          setState('listening', 'Listening…');
        } else if (agentState === 'thinking') {
          setState('thinking', 'Thinking…');
        } else if (agentState === 'initializing') {
          setState('thinking', 'Initializing…');
        } else {
          setState('listening', 'Listening…');
        }
      }

      updateFromAttributes();
      participant.on(ParticipantEvent.AttributesChanged, updateFromAttributes);
    }

    // ─── CAMERA & GROK VISION ─────────────────────────────────
    const XAI_API_KEY = ''; // ← paste your xai-... key here for vision analysis
    let cameraStream = null;
    let capturedImageBase64 = null;
    let lastAnalysis = '';

    async function openCamera() {
      document.getElementById('photoOverlay').classList.add('visible');
      document.getElementById('cameraFeed').style.display = 'block';
      document.getElementById('photoPreview').style.display = 'none';
      document.getElementById('snapBtn').style.display = 'flex';
      document.getElementById('analyseBtn').style.display = 'none';
      document.getElementById('retakeBtn').style.display = 'none';
      capturedImageBase64 = null;

      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false
        });
        document.getElementById('cameraFeed').srcObject = cameraStream;
      } catch (err) {
        // Fallback to front camera
        try {
          cameraStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
          document.getElementById('cameraFeed').srcObject = cameraStream;
        } catch (err2) {
          alert('Camera access denied. Please allow camera access and try again.');
          closeCamera();
        }
      }
    }

    function snapPhoto() {
      const video = document.getElementById('cameraFeed');
      const canvas = document.getElementById('photoCanvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);

      capturedImageBase64 = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];

      const preview = document.getElementById('photoPreview');
      preview.src = canvas.toDataURL('image/jpeg', 0.85);
      preview.style.display = 'block';
      video.style.display = 'none';

      document.getElementById('snapBtn').style.display = 'none';
      document.getElementById('analyseBtn').style.display = 'flex';
      document.getElementById('retakeBtn').style.display = 'flex';

      // Stop camera stream
      if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
    }

    function retakePhoto() {
      capturedImageBase64 = null;
      document.getElementById('photoPreview').style.display = 'none';
      document.getElementById('cameraFeed').style.display = 'block';
      document.getElementById('snapBtn').style.display = 'flex';
      document.getElementById('analyseBtn').style.display = 'none';
      document.getElementById('retakeBtn').style.display = 'none';
      openCamera();
    }

    async function analysePhoto() {
      if (!capturedImageBase64) return;

      document.getElementById('analyseBtn').textContent = '⏳ Analysing…';
      document.getElementById('analyseBtn').disabled = true;

      // Show thumbnail
      const thumb = document.getElementById('photoThumbnail');
      thumb.src = 'data:image/jpeg;base64,' + capturedImageBase64;
      thumb.classList.add('visible');

      closeCamera();

      // Show loading state in bubble
      const bubble = document.getElementById('analysisBubble');
      const analysisText = document.getElementById('analysisText');
      analysisText.textContent = 'Analysing image…';
      bubble.classList.add('visible');

      try {
        if (!XAI_API_KEY) {
          // Demo mode — no API key
          lastAnalysis = 'Demo mode: Add your XAI_API_KEY to index.html to enable real Grok vision analysis. In production, Grok will describe what it sees in the image and suggest next steps.';
          analysisText.textContent = lastAnalysis;
          return;
        }

        const response = await fetch('https://api.x.ai/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${XAI_API_KEY}`
          },
          body: JSON.stringify({
            model: 'grok-2-vision-latest',
            messages: [{
              role: 'user',
              content: [
                {
                  type: 'image_url',
                  image_url: { url: `data:image/jpeg;base64,${capturedImageBase64}` }
                },
                {
                  type: 'text',
                  text: 'You are a trade and service business assistant. Analyse this image and provide a brief triage: (1) What is the issue or item shown? (2) How severe does it appear? (3) What trade or service is needed? Keep your response concise and practical — 2-3 sentences max.'
                }
              ]
            }],
            max_tokens: 200
          })
        });

        const data = await response.json();
        if (data.error) throw new Error(data.error.message);
        lastAnalysis = data.choices[0].message.content;
        analysisText.textContent = lastAnalysis;

        // Also speak the analysis if connected
        console.log('📸 Grok vision analysis:', lastAnalysis);

      } catch (err) {
        console.error('Vision analysis failed:', err);
        analysisText.textContent = 'Analysis failed: ' + err.message;
      }
    }

    function closeCamera() {
      if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
      document.getElementById('photoOverlay').classList.remove('visible');
      document.getElementById('analyseBtn').textContent = '🔍 Analyse with Grok';
      document.getElementById('analyseBtn').disabled = false;
    }

    function showAnalysis() {
      if (lastAnalysis) document.getElementById('analysisBubble').classList.add('visible');
    }
    // ──────────────────────────────────────────────────────────

    async function disconnect() {
      if (room) {
        await room.disconnect();
        room = null;
      }
      setState('idle', 'Tap to begin');
      setStatus('Ready');
      setControls('idle');
    }
  </script>
</body>
</html>
